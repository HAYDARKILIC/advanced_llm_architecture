# ---------------------------------------------------------------------------
# BitNet b1.58 — base configuration
# ---------------------------------------------------------------------------
# Used by Week-1 experiments and the capstone (Week-6) build.
# Ternary weights {-1, 0, +1} via absmean ternarization (Ma et al., 2024).
# ---------------------------------------------------------------------------

model:
  name: bitnet_158_base
  vocab_size: 32000
  d_model: 384
  n_layers: 6
  n_heads: 6
  d_ff: 1024        # SwiGLU intermediate ≈ (8/3) * d_model, rounded to mult of 32
  max_seq_len: 4096
  tie_embeddings: true
  attn_impl: sdpa   # one of: naive | tiled | sdpa | linear
  norm: rmsnorm
  ffn: swiglu
  dropout: 0.0

quantization:
  enabled: true
  weight_bits: 1.58        # ternary {-1, 0, +1}
  activation_bits: 8       # absmax int8
  ste: true                # straight-through estimator
  scale_init: absmean      # γ = mean(|W|)
  groupwise: false         # per-tensor scale; true => per-channel

positional:
  type: rope
  base_theta: 10000.0
  # YaRN extension (used during long-context fine-tune)
  yarn:
    enabled: false
    scale: 8.0
    original_max_seq_len: 4096

train:
  optimizer: adamw
  lr: 3.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip: 1.0
  batch_size: 32
  seq_len: 1024
  warmup_steps: 1000
  total_steps: 50000
  precision: bf16
  seed: 42

eval:
  perplexity_context_lengths: [1024, 2048, 4096, 8192, 16384, 32768]
  stride: 512
